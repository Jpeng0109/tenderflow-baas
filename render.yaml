# TENDERFLOW — Explorer + Console + API on Render
# One-click: https://dashboard.render.com/blueprint/new?repo=https://github.com/Jpeng0109/tenderflow-baas

services:
  - type: web
    name: tenderflow-api
    runtime: node
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: npm install --omit=dev --no-optional
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: SERVICE_MODE
        value: unified
      - key: CLOUD_DEMO_MODE
        value: "true"
      - key: CONSOLE_URL
        fromService:
          type: web
          name: tenderflow-console
          envVarKey: RENDER_EXTERNAL_URL
      - key: EXPLORER_URL
        fromService:
          type: web
          name: tenderflow-explorer
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: tenderflow-explorer
    runtime: static
    plan: starter
    branch: main
    rootDir: explorer
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_ORIGIN
        fromService:
          type: web
          name: tenderflow-api
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: tenderflow-console
    runtime: static
    plan: starter
    branch: main
    rootDir: console
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_ORIGIN
        fromService:
          type: web
          name: tenderflow-api
          envVarKey: RENDER_EXTERNAL_URL
