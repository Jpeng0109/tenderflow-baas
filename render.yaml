# TENDERFLOW API — Render only (Explorer + Console on Vercel)
# https://dashboard.render.com/blueprint/new?repo=https://github.com/Jpeng0109/tenderflow-baas

services:
  - type: web
    name: tenderflow-api
    runtime: node
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: npm install --omit=dev --no-optional
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: SERVICE_MODE
        value: unified
      - key: CLOUD_DEMO_MODE
        value: "true"
      - key: CONSOLE_URL
        sync: false
      - key: EXPLORER_URL
        sync: false
