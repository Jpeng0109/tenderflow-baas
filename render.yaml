# TENDERFLOW API — Render (Docker) + Vercel frontends
# https://dashboard.render.com/blueprint/new?repo=https://github.com/Jpeng0109/tenderflow-baas

services:
  - type: web
    name: tenderflow-api
    runtime: docker
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: SERVICE_MODE
        value: unified
      - key: CLOUD_DEMO_MODE
        value: "true"
      - key: CONSOLE_URL
        value: https://console-gray-pi.vercel.app
      - key: EXPLORER_URL
        value: https://explorer-omega-pearl.vercel.app
      - key: CORS_ORIGINS
        value: https://console-gray-pi.vercel.app,https://explorer-omega-pearl.vercel.app
