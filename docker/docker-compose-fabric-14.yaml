  orderer1.clearing-raft.org:
    image: hyperledger/fabric-orderer:${FABRIC_VERSION}
    container_name: orderer1.clearing-raft.org
    environment:
      <<: *fabric-orderer-env
      ORDERER_GENERAL_LISTENPORT: 7050
      ORDERER_GENERAL_LOCALMSPID: ClearingRaftMSP
    volumes:
      - ../organizations/ordererOrganizations/clearing-raft.org/orderers/orderer1.clearing-raft.org:/var/hyperledger/orderer
    ports:
      - "7050:7050"
      - "8443:8443"
    networks: [fx_bridge]

