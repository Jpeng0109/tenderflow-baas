鬠ｿ# Financial Bridge BaaS 驤･?14-node Hyperledger Fabric cluster + platform services
# 5 RAFT orderers (clearing-raft.org) + 9 peers (3 orgs 閼ｳ 3) | CouchDB state
# Channel: fx-bridge-channel

x-fabric-orderer-env: &fabric-orderer-env
  FABRIC_LOGGING_SPEC: INFO
  ORDERER_GENERAL_LISTENADDRESS: 0.0.0.0
  ORDERER_GENERAL_BOOTSTRAPMETHOD: none
  ORDERER_CHANNELPARTICIPATION_ENABLED: "true"
  ORDERER_ADMIN_LISTENADDRESS: 0.0.0.0:7053
  ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE: /var/hyperledger/orderer/tls/server.crt
  ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY: /var/hyperledger/orderer/tls/server.key
  ORDERER_GENERAL_CLUSTER_ROOTCAS: /var/hyperledger/orderer/tls/ca.crt
  ORDERER_GENERAL_TLS_ENABLED: "true"
  ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
  ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
  ORDERER_GENERAL_TLS_ROOTCAS: /var/hyperledger/orderer/tls/ca.crt
  ORDERER_GENERAL_LOCALMSPID: ClearingRaftMSP
  ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
  ORDERER_GENERAL_LEDGERTYPE: file
  ORDERER_OPERATIONS_LISTENADDRESS: 0.0.0.0:8443
  ORDERER_METRICS_PROVIDER: prometheus

x-fabric-peer-env: &fabric-peer-env
  FABRIC_LOGGING_SPEC: INFO
  CORE_PEER_TLS_ENABLED: "true"
  CORE_PEER_GOSSIP_USELEADERELECTION: "true"
  CORE_PEER_GOSSIP_ORGLEADER: "false"
  CORE_PEER_PROFILE_ENABLED: "false"
  CORE_PEER_CHAINCODE_BUILDER: hyperledger/fabric-ccenv:${FABRIC_VERSION}
  CORE_PEER_CHAINCODE_LAUNCHER: hyperledger/fabric-baseos:${FABRIC_VERSION}
  CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
  CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: fx-bridge_fx_bridge
  CORE_LEDGER_STATE_STATEDATABASE: CouchDB
  CORE_OPERATIONS_LISTENADDRESS: 0.0.0.0:9444
  CORE_METRICS_PROVIDER: prometheus
  CORE_CHAINCODE_EXECUTETIMEOUT: 300s

x-couchdb-env: &couchdb-env
  COUCHDB_USER: admin
  COUCHDB_PASSWORD: fxbridge_couch_secret

networks:
  fx_bridge:
    name: fx-bridge_fx_bridge
    driver: bridge

